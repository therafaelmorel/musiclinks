<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Your Music — Listen Everywhere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --text-dim: rgba(240,237,232,0.5);
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.15);
    --border: rgba(255,255,255,0.06);
    --radius: 16px;
    --radius-sm: 12px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'Outfit', sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    -webkit-tap-highlight-color: transparent;
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Ambient background ── */
  .ambient {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .ambient::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(200,255,0,0.08) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite alternate;
  }
  .ambient::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    bottom: 10%; right: -100px;
    background: radial-gradient(circle, rgba(200,255,0,0.04) 0%, transparent 70%);
    animation: pulse 10s ease-in-out 2s infinite alternate;
  }
  @keyframes pulse {
    0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    100% { opacity: 1; transform: translateX(-50%) scale(1.15); }
  }

  /* ── Noise overlay ── */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  /* ── Main container ── */
  .container {
    position: relative;
    z-index: 2;
    max-width: 440px;
    margin: 0 auto;
    padding: 0 20px;
    padding-top: env(safe-area-inset-top, 20px);
    padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 40px);
  }

  /* ── Header / Profile ── */
  .header {
    text-align: center;
    padding: 48px 0 36px;
    animation: fadeUp 0.6s ease-out both;
  }
  .avatar {
    width: 96px; height: 96px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--accent-dim), var(--bg-card));
    border: 2px solid var(--border);
    overflow: hidden;
    position: relative;
  }
  .avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .avatar-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 32px;
    color: var(--accent);
    background: linear-gradient(135deg, rgba(200,255,0,0.1), rgba(200,255,0,0.02));
  }
  .artist-name {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .artist-tagline {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── Featured / Now Playing ── */
  .featured {
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.15s ease-out both;
  }
  .section-label {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .featured-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .featured-card:hover, .featured-card:active {
    background: var(--bg-card-hover);
    border-color: rgba(200,255,0,0.15);
    transform: translateY(-2px);
  }
  .featured-artwork {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 50%, #1a1a2e 100%);
    position: relative;
    overflow: hidden;
  }
  .featured-artwork img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .artwork-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .artwork-placeholder .bars {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 48px;
  }
  .artwork-placeholder .bar {
    width: 6px;
    background: var(--accent);
    border-radius: 3px;
    animation: eq 1.2s ease-in-out infinite;
  }
  .artwork-placeholder .bar:nth-child(1) { height: 60%; animation-delay: 0s; }
  .artwork-placeholder .bar:nth-child(2) { height: 100%; animation-delay: 0.15s; }
  .artwork-placeholder .bar:nth-child(3) { height: 40%; animation-delay: 0.3s; }
  .artwork-placeholder .bar:nth-child(4) { height: 80%; animation-delay: 0.45s; }
  .artwork-placeholder .bar:nth-child(5) { height: 55%; animation-delay: 0.6s; }
  @keyframes eq {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(0.4); }
  }
  .featured-artwork::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
    opacity: 0.5;
  }
  .featured-info {
    padding: 16px 20px 20px;
  }
  .featured-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .featured-meta {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .featured-meta .tag {
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── Platform links ── */
  .links-section {
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.3s ease-out both;
  }
  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    text-decoration: none;
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 15px;
    transition: all 0.25s ease;
    margin-bottom: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .link-btn:hover, .link-btn:active {
    background: var(--bg-card-hover);
    border-color: rgba(255,255,255,0.1);
    transform: translateY(-1px);
  }
  .link-btn:active {
    transform: scale(0.985);
  }
  .link-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .link-icon svg {
    width: 20px; height: 20px;
  }
  .link-icon.spotify { background: rgba(30,215,96,0.12); color: #1ed760; }
  .link-icon.apple { background: rgba(252,60,68,0.12); color: #fc3c44; }
  .link-icon.soundcloud { background: rgba(255,136,0,0.12); color: #ff8800; }
  .link-icon.youtube { background: rgba(255,0,0,0.12); color: #ff0000; }
  .link-icon.tidal { background: rgba(255,255,255,0.08); color: #ffffff; }
  .link-icon.amazon { background: rgba(37,209,218,0.12); color: #25d1da; }
  .link-icon.deezer { background: rgba(160,51,255,0.12); color: #a033ff; }
  .link-icon.bandcamp { background: rgba(29,160,195,0.12); color: #1da0c3; }
  .link-arrow {
    margin-left: auto;
    color: var(--text-dim);
    transition: transform 0.25s ease, color 0.25s ease;
  }
  .link-btn:hover .link-arrow, .link-btn:active .link-arrow {
    transform: translateX(3px);
    color: var(--accent);
  }

  /* ── More tracks section ── */
  .tracks-section {
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.45s ease-out both;
  }
  .track-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: opacity 0.2s ease;
  }
  .track-item:last-child { border-bottom: none; }
  .track-item:hover { opacity: 0.8; }
  .track-art {
    width: 52px; height: 52px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(200,255,0,0.08), rgba(200,255,0,0.02));
    flex-shrink: 0;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .track-art img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .track-art-placeholder {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    opacity: 0.5;
  }
  .track-info {
    flex: 1;
    min-width: 0;
  }
  .track-title {
    font-weight: 500;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-detail {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 300;
    margin-top: 2px;
  }
  .track-play {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--text-dim);
    transition: all 0.25s ease;
  }
  .track-item:hover .track-play {
    background: var(--accent-dim);
    border-color: rgba(200,255,0,0.2);
    color: var(--accent);
  }

  /* ── Socials ── */
  .socials {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.6s ease-out both;
  }
  .social-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-dim);
    text-decoration: none;
    transition: all 0.25s ease;
  }
  .social-btn:hover, .social-btn:active {
    background: var(--accent-dim);
    border-color: rgba(200,255,0,0.2);
    color: var(--accent);
  }
  .social-btn svg { width: 18px; height: 18px; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 20px 0;
    animation: fadeUp 0.6s 0.7s ease-out both;
  }
  .footer p {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    font-weight: 300;
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive polish ── */
  @media (max-width: 380px) {
    .artist-name { font-size: 24px; }
    .featured-title { font-size: 18px; }
    .link-btn { padding: 14px 16px; font-size: 14px; }
  }
  @media (min-width: 441px) {
    .container { padding: 0 32px; }
  }

  /* ── Scroll bar ── */
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
